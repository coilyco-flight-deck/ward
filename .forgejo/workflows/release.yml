name: release

# Forgejo-canonical release pipeline. Triggers on push to main against the
# forgejo repo (forgejo.coilysiren.me/coilyco-flight-deck/ward). Conventional
# commits drive the semver bump (patch default). Cuts the tag + release on
# forgejo, then bumps the homebrew formula(e) so `brew upgrade ward` builds
# the new tag from source.
#
# ward's formula is build-from-source (url+tag+revision -> go build), so unlike
# o2r there are no prebuilt binaries to attach. The two bump jobs rewrite the
# formula url line:
#   - bump-tap-formula:  the centralized flight-deck tap (homebrew-tap).
#   - bump-formula:      the in-repo fallback Formula/ward.rb (deprecated; drop
#                        with the direct-repo tap next cycle).
#
# Both bumps carry the skip-CI marker so the formula commit does not
# re-trigger this workflow. Shared composite actions live at
# coilysiren/agentic-os/actions/*. Replaces the prior .github/workflows
# release; building moved off GitHub Actions onto Forgejo.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: docker
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: tag
        uses: coilysiren/agentic-os/actions/tag-bump@main
        with:
          default_bump: patch

      - id: create
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: coilysiren/agentic-os/actions/create-release@main
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap-formula:
    # Rewrite Formula/ward.rb in the centralized flight-deck tap
    # (coilyco-flight-deck/homebrew-tap) to the just-cut tag + revision. The
    # tap is where `brew install coilyco-flight-deck/tap/ward` reads from.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    env:
      TAG: ${{ needs.release.outputs.tag }}
      FORGEJO_BASE_URL: https://forgejo.coilysiren.me
      WARD_REPO: coilyco-flight-deck/ward
      TAP_REPO: coilyco-flight-deck/homebrew-tap
      FORMULA_PATH: Formula/ward.rb
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: rev
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rewrite tap Formula url via forgejo Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          # Patch on top of the tap's live main, preserving non-version edits.
          meta=$(curl -fsS -H "Authorization: token $FORGEJO_TOKEN" \
            "$FORGEJO_BASE_URL/api/v1/repos/$TAP_REPO/contents/$FORMULA_PATH?ref=main")
          cur_sha=$(jq -r '.sha' <<< "$meta")
          jq -r '.content' <<< "$meta" | base64 -d > "$tmp/ward.rb"
          new_line="  url \"$FORGEJO_BASE_URL/${WARD_REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          awk -v repl="$new_line" '
            /^  url "/ && !done { print repl; done = 1; next }
            { print }
          ' "$tmp/ward.rb" > "$tmp/ward.new.rb"
          mv "$tmp/ward.new.rb" "$tmp/ward.rb"
          new_b64=$(base64 -w0 < "$tmp/ward.rb")
          payload=$(jq -n --arg msg "chore(formula): bump ward to ${TAG} [skip ci]" \
            --arg c "$new_b64" --arg sha "$cur_sha" --arg branch main \
            '{message:$msg, content:$c, sha:$sha, branch:$branch}')
          code=$(curl -sS -o /tmp/tapresp.json -w '%{http_code}' -X PUT \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$FORGEJO_BASE_URL/api/v1/repos/$TAP_REPO/contents/$FORMULA_PATH")
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::forgejo tap formula bump failed: HTTP $code"
            cat /tmp/tapresp.json
            exit 1
          fi

  bump-formula:
    # In-repo fallback Formula/ward.rb on the ward repo's own forgejo main.
    # Deprecated alongside the direct-repo tap; drop next cycle.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    env:
      TAG: ${{ needs.release.outputs.tag }}
      FORGEJO_BASE_URL: https://forgejo.coilysiren.me
      WARD_REPO: coilyco-flight-deck/ward
      FORMULA_PATH: Formula/ward.rb
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: rev
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rewrite in-repo Formula url via forgejo Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          meta=$(curl -fsS -H "Authorization: token $FORGEJO_TOKEN" \
            "$FORGEJO_BASE_URL/api/v1/repos/$WARD_REPO/contents/$FORMULA_PATH?ref=main")
          cur_sha=$(jq -r '.sha' <<< "$meta")
          jq -r '.content' <<< "$meta" | base64 -d > "$tmp/ward.rb"
          new_line="  url \"$FORGEJO_BASE_URL/${WARD_REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          awk -v repl="$new_line" '
            /^  url "/ && !done { print repl; done = 1; next }
            { print }
          ' "$tmp/ward.rb" > "$tmp/ward.new.rb"
          mv "$tmp/ward.new.rb" "$tmp/ward.rb"
          new_b64=$(base64 -w0 < "$tmp/ward.rb")
          payload=$(jq -n --arg msg "chore(formula): bump to ${TAG} [skip ci]" \
            --arg c "$new_b64" --arg sha "$cur_sha" --arg branch main \
            '{message:$msg, content:$c, sha:$sha, branch:$branch}')
          code=$(curl -sS -o /tmp/represp.json -w '%{http_code}' -X PUT \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$FORGEJO_BASE_URL/api/v1/repos/$WARD_REPO/contents/$FORMULA_PATH")
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::in-repo formula bump failed: HTTP $code"
            cat /tmp/represp.json
            exit 1
          fi
