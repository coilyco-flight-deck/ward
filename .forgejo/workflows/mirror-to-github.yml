# Push Forgejo main+tags to the read-only GitHub mirror; no-ops without the PAT.

name: mirror-to-github

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  mirror:
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mirror to GitHub
        env:
          PAT: ${{ secrets.GITHUB_MIRROR_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${PAT}" ]; then
            echo "mirror-to-github: GITHUB_MIRROR_PAT secret not set; skipping." >&2
            exit 0
          fi
          git remote add github "https://x-access-token:${PAT}@github.com/coilyco-flight-deck/ward.git"
          git push --force github main
          git push --force --tags github
