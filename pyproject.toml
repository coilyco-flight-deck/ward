# Config for the agentic-os catalog pre-commit hooks. ward ships no Python;
# this file exists only to carry per-repo hook opt-outs, which the
# tree-walking hooks read here (they bypass pre-commit's own exclude:).

[tool.agentic-os.documentation-layout]
excludes = [
  # Pre-existing size debt: docs/hook.md is 92 lines, over the 80-line cap.
  # The split is tracked in coilyco-flight-deck/ward#50; drop this when it lands.
  "docs/hook.md",
  # Pre-existing size debt: README.md is over the 4000-char cap (tripped by
  # See-also growth, not by any single feature). The split is tracked in
  # coilyco-flight-deck/ward#274; drop this when it lands.
  "README.md",
  # Generated surface reference (specverb-gen). The driver emits one beside each
  # Guardfile; the reviewed copies are committed under docs/ward-kdl/ (ward#279)
  # and grow with the verb surface, so the layout size cap does not apply. One
  # slash-less basename glob covers every generated doc wherever it lands - the
  # reviewed copy under docs/ward-kdl/ and the gitignored beside-the-kdl emission
  # under cmd/ward-kdl/ (incl. the per-tier ward-kdl-<read,write,admin>/ subdirs,
  # ward#240). The directory pattern keeps the docs/ward-kdl/ subfolder itself
  # from tripping the docs-flatness rule.
  "ward-kdl.*.guardfile.md",
  "docs/ward-kdl/**",
  # Embedded container agent doctrine: a ward binary asset (go:embed), not a
  # doc, and it must sit beside its package, so the markdown-location and size
  # caps do not apply. See docs/container.md.
  "cmd/ward/containerassets/AGENTS.container.md",
]

[tool.agentic-os.code-comments]
excludes = [
  # Managed by apply-agentic-os-hooks.py: the BEGIN/END markers are generated
  # comments past line 1, so the YAML rule cannot apply. Mirrors agentic-os.
  ".pre-commit-config.yaml",
]
