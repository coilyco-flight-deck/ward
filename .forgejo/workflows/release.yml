# Forgejo-canonical release pipeline. See docs/release.md.

name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: docker
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: tag
        uses: coilysiren/agentic-os/actions/tag-bump@main

      - id: create
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: coilysiren/agentic-os/actions/create-release@main
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  publish-binaries:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    env:
      TAG: ${{ needs.release.outputs.tag }}
      GO_VERSION: "1.26.4"
      FORGEJO_API: https://forgejo.coilysiren.me/api/v1/repos/coilyco-flight-deck/ward
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Install Go
        run: |
          set -euo pipefail
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
          tar -xzf /tmp/go.tar.gz -C /usr/local
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Cross-compile ward (linux amd64 + arm64)
        timeout-minutes: 12
        run: |
          set -euo pipefail
          # GOPROXY=direct so fresh cli-guard pseudo-versions resolve, mirroring
          # the brew formula's build. See docs/homebrew-build.md.
          export GOPROXY=direct GOSUMDB=off
          mkdir -p dist
          # Pre-fetch modules in a bounded, retried block before building. A
          # GOPROXY=direct git fetch hung ~5min then failed in run 405 and shipped
          # v0.149.0 with zero binaries: the build step died, so the Upload step
          # never ran. The only network-flaky part is resolving the cli-guard
          # pseudo-version; bounding each attempt and retrying lets a transient
          # hang recover instead of silently dropping a release's assets. The
          # go build below then runs against the warm cache. See docs/release.md.
          bound() { if command -v timeout >/dev/null 2>&1; then timeout 180 "$@"; else "$@"; fi; }
          for attempt in 1 2 3; do
            if bound go mod download; then break; fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::go mod download failed after 3 attempts (GOPROXY=direct fetch); release binaries not built" >&2
              exit 1
            fi
            echo "go mod download attempt ${attempt} failed/timed out; retrying in 5s" >&2
            sleep 5
          done
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.Version=${TAG}" \
              -o "dist/ward-linux-${arch}" ./cmd/ward
          done
          ls -l dist

      - name: Upload binaries as release assets
        env:
          TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::CI_RELEASE_TOKEN not set; cannot upload release assets" >&2
            exit 1
          fi
          rel_id=$(curl -fsSL -H "Authorization: token ${TOKEN}" \
            "${FORGEJO_API}/releases/tags/${TAG}" \
            | grep -oE '"id"[[:space:]]*:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+')
          if [ -z "${rel_id:-}" ]; then
            echo "::error::no release found for tag ${TAG}" >&2
            exit 1
          fi
          for arch in amd64 arm64; do
            curl -fsSL -X POST -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"dist/ward-linux-${arch}" \
              "${FORGEJO_API}/releases/${rel_id}/assets?name=ward-linux-${arch}"
            echo "uploaded ward-linux-${arch}"
          done

  publish-kdl-tiers:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        tier: [read, write, admin]
    env:
      TAG: ${{ needs.release.outputs.tag }}
      GO_VERSION: "1.26.4"
      KDL_GEN_REF: v0.48.0
      TIER: ${{ matrix.tier }}
      KDL_GUARDFILE: ./cmd/ward-kdl/ward-kdl-${{ matrix.tier }}/ward-kdl.forgejo.${{ matrix.tier }}.guardfile.kdl
      GOPRIVATE: forgejo.coilysiren.me
      FORGEJO_API: https://forgejo.coilysiren.me/api/v1/repos/coilyco-flight-deck/ward
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Install Go
        run: |
          set -euo pipefail
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
          tar -xzf /tmp/go.tar.gz -C /usr/local
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Build ward-kdl-${{ matrix.tier }} (linux amd64 + arm64)
        timeout-minutes: 15
        run: |
          set -euo pipefail
          # Generated, not a plain ./cmd build: the generator (KDL_GEN_REF, in
          # lockstep with the Makefile's REF) renders + builds the tier binary,
          # entered via the tier's forgejo guardfile. The driver discovers and
          # merges EVERY ward-kdl.*.guardfile.kdl in the tier subdir that shares
          # the `wrap ward-kdl-<tier>` name (forgejo + signoz today), so the asset
          # carries the FULL tier surface, not just forgejo (ward#338, ward#343) -
          # matching `make build-ward-kdl-tiers`. The write tier is the one the
          # in-container broker shells (ward#329). See docs/broker.md, docs/ward-kdl.md.
          # GOPROXY=direct so fresh cli-guard pseudo-versions resolve, mirroring
          # publish-binaries and the brew formula. See docs/homebrew-build.md.
          export GOPROXY=direct GOSUMDB=off
          mkdir -p dist
          gen="forgejo.coilysiren.me/coilyco-flight-deck/cli-guard/cmd/specverb-gen@${KDL_GEN_REF}"
          bound() { if command -v timeout >/dev/null 2>&1; then timeout 240 "$@"; else "$@"; fi; }
          # amd64 (host): the generator renders + builds the tier binary directly.
          for attempt in 1 2 3; do
            if bound go run "$gen" build --guardfile "$KDL_GUARDFILE" \
                 --out "dist/ward-kdl-${TIER}-linux-amd64" --set-version "$TAG"; then break; fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::ward-kdl-${TIER} amd64 build failed after 3 attempts" >&2
              exit 1
            fi
            echo "ward-kdl-${TIER} build attempt ${attempt} failed/timed out; retrying in 5s" >&2
            sleep 5
          done
          # arm64: specverb-gen build is host-arch only, so cross-build from the
          # self-contained module it just materialized in the generator cache. The
          # CI cache is fresh and this is one matrix job per tier (not a loop), so
          # exactly one cache dir exists - keeping this single-result `find`
          # unambiguous, which is why the tiers fan out as separate jobs.
          cachedir="$(find "$HOME/.cli-guard/cache/specverb" -mindepth 1 -maxdepth 1 -type d | head -1)"
          if [ -z "$cachedir" ] || [ ! -f "$cachedir/main.go" ]; then
            echo "::error::could not locate the generator cache module for the arm64 cross-build" >&2
            exit 1
          fi
          ( cd "$cachedir" && GOOS=linux GOARCH=arm64 go build -trimpath \
              -ldflags "-s -w -X main.Version=${TAG}" \
              -o "${GITHUB_WORKSPACE}/dist/ward-kdl-${TIER}-linux-arm64" . )
          ls -l dist

      - name: Upload ward-kdl-${{ matrix.tier }} as release assets
        env:
          TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::CI_RELEASE_TOKEN not set; cannot upload ward-kdl-${TIER} assets" >&2
            exit 1
          fi
          rel_id=$(curl -fsSL -H "Authorization: token ${TOKEN}" \
            "${FORGEJO_API}/releases/tags/${TAG}" \
            | grep -oE '"id"[[:space:]]*:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+')
          if [ -z "${rel_id:-}" ]; then
            echo "::error::no release found for tag ${TAG}" >&2
            exit 1
          fi
          for arch in amd64 arm64; do
            curl -fsSL -X POST -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"dist/ward-kdl-${TIER}-linux-${arch}" \
              "${FORGEJO_API}/releases/${rel_id}/assets?name=ward-kdl-${TIER}-linux-${arch}"
            echo "uploaded ward-kdl-${TIER}-linux-${arch}"
          done

  bump-tap-formula:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    env:
      TAG: ${{ needs.release.outputs.tag }}
      FORGEJO_BASE_URL: https://forgejo.coilysiren.me
      WARD_REPO: coilyco-flight-deck/ward
      TAP_REPO: coilyco-flight-deck/homebrew-tap
      FORMULA_PATH: Formula/ward.rb
    steps:
      - name: Bump tap formula and push
        env:
          TAP_WRITE_TOKEN: ${{ secrets.TAP_WRITE_TOKEN }}
        run: |
          # pipefail matters: the sha256 below is computed through a pipe, and
          # without it a failed tarball fetch would hash an empty/error body into
          # a bogus digest and the release would ship a broken formula silently.
          set -euo pipefail
          # Push auth is an explicit Actions secret, mirroring publish-binaries'
          # CI_RELEASE_TOKEN: one rotatable, visible credential instead of the
          # tap-writer runner's hidden git credential helper, which broke silently
          # and froze the tap at v0.96.0 (ward#237, ward#243). Guard up front so a
          # missing secret fails loudly here rather than at the push.
          if [ -z "${TAP_WRITE_TOKEN:-}" ]; then
            echo "::error::TAP_WRITE_TOKEN not set; cannot push tap formula" >&2
            exit 1
          fi
          # Source the release as a tarball, not a git tag+revision: Homebrew's
          # git download strategy moves .git out during staging and then can't read
          # the commit time, dying with `ArgumentError: no time information in ""`.
          # Forgejo serves a stable archive per tag, so pin its sha256. See ward#116.
          tarball_url="$FORGEJO_BASE_URL/${WARD_REPO}/archive/${TAG}.tar.gz"
          if command -v sha256sum >/dev/null 2>&1; then sha_cmd="sha256sum"; else sha_cmd="shasum -a 256"; fi
          sha256=$(curl -fsSL "$tarball_url" | $sha_cmd | awk '{print $1}')
          if ! printf '%s' "$sha256" | grep -Eq '^[0-9a-f]{64}$'; then
            echo "::error::computed sha256 '${sha256}' for ${tarball_url} is not a 64-hex digest; refusing to write formula" >&2
            exit 1
          fi

          # Clone the tap's live main and patch on top, so any non-version
          # edits (build flags, test logic) survive.
          git clone --depth 1 "$FORGEJO_BASE_URL/$TAP_REPO.git" tap
          cd tap
          # Replace the url line with the tarball url + its sha256, dropping any
          # existing sha256 line so re-runs stay idempotent.
          awk -v url="  url \"$tarball_url\"" -v sha="  sha256 \"$sha256\"" '
            /^  url "/ && !done { print url; print sha; done = 1; next }
            /^  sha256 "/ { next }
            { print }
          ' "$FORMULA_PATH" > "$FORMULA_PATH.new"
          mv "$FORMULA_PATH.new" "$FORMULA_PATH"

          if git diff --quiet -- "$FORMULA_PATH"; then
            echo "formula already at ${TAG}, nothing to push"
            exit 0
          fi
          # Tap bump attributes to the coilyco-ops bot via its registered email,
          # the match Forgejo links on (ward#245, docs/agent-attribution.md).
          git config user.name "forgejo-tap-writer"
          git config user.email "coilyco-ops@coilysiren.me"
          git commit -aqm "chore(formula): bump ward to ${TAG} [skip ci]"
          # Authenticate the push with TAP_WRITE_TOKEN in the URL. The token is
          # never echoed: it lives only in this variable (no `set -x`), and git
          # masks credentials in the userinfo of any URL it prints on failure. A
          # missing, rotated, or under-scoped token makes the push exit non-zero,
          # which (set -e) fails the release loudly rather than stalling the tap
          # behind a green build. This is the failure mode behind ward#237.
          push_url="https://coilysiren:${TAP_WRITE_TOKEN}@forgejo.coilysiren.me/${TAP_REPO}.git"
          if ! git push "$push_url" HEAD:main; then
            echo "::error::push of ${FORMULA_PATH} to ${TAP_REPO} failed; TAP_WRITE_TOKEN is likely missing, rotated, or lacks push scope (see docs/release.md)" >&2
            exit 1
          fi

          # Read the tap back and confirm main now serves ${TAG}. This catches a
          # push that reports success but does not land the bump, so a stale tap
          # can never masquerade as a green release (ward#237 acceptance: the bump
          # step fails the release loudly on write errors).
          published=$(curl -fsSL "$FORGEJO_BASE_URL/$TAP_REPO/raw/branch/main/$FORMULA_PATH" || true)
          if ! printf '%s' "$published" | grep -q "/archive/${TAG}.tar.gz"; then
            echo "::error::tap ${TAP_REPO} main does not serve ${TAG} after push; formula bump did not land" >&2
            exit 1
          fi
          echo "tap ${TAP_REPO} formula bumped to ${TAG}"
