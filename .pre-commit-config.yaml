repos:

  # BEGIN managed by agentic-os/scripts/apply-agentic-os-hooks.py
  - repo: https://forgejo.coilysiren.me/coilyco-flight-deck/agentic-os
    rev: v0.65.0
    hooks:
      - id: catalog-doc-size
      - id: catalog-trifecta
      - id: documentation-layout
      - id: context-load-points
      - id: code-comments
      - id: catalog-block-present
      - id: check-skills
      - id: dead-cross-links
      - id: repo-pointer-skills
      - id: misplaced-skills
      - id: merge-conflicts
      - id: agent-compose-size
      - id: agent-compose-dedup
      - id: trufflehog
  # END managed by agentic-os/scripts/apply-agentic-os-hooks.py

  # kdlfmt check: gate the ward-kdl guardfiles on kdlfmt's format. The hook is
  # `language: system`, so it needs kdlfmt on PATH (`brew install hougesen/tap/kdlfmt`).
  - repo: https://github.com/hougesen/kdlfmt
    rev: v0.1.7
    hooks:
      - id: kdlfmt-check
