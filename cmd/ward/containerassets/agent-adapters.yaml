# Agent-adapter manifest - the single source of per-agent divergence ward needs
# to drive a harness (binary, context level, argv dialect, headless stream format,
# auth) without compiled Go switches or bash case statements. This is the aos
# pre-req for ward#152. aos publishes the canonical manifest; ward embeds this
# pinned copy so a container needs no network to know its agent's dialect (the
# same denormalized pattern as preclone-repos.txt). Schema, field semantics, and
# each agent's dialect notes live in docs/agent-adapter-manifest.md. The
# contract test (agent_adapter_test.go) pins every entry to the still-live Go
# switches so the ward#152 swap stays behavior-preserving.

schemaVersion: 1

agents:
  - name: claude
    binary: claude
    contextLevel: 2
    stream: stream-json
    auth: claude-keychain
    argv:
      preflight: [claude, -p]
      headless: [claude, -p, --verbose, --output-format, stream-json]
      interactive: [claude]

  - name: codex
    binary: codex
    contextLevel: 1
    stream: none
    auth: codex-file
    argv:
      preflight: []
      headless: [codex, exec]
      interactive: [codex]

  - name: qwen
    binary: opencode
    contextLevel: 0
    stream: none
    auth: none
    argv:
      preflight: []
      headless: [opencode, run]
      interactive: [opencode]

  - name: goose
    binary: goose
    contextLevel: 2
    stream: none
    auth: ollama
    argv:
      preflight: [goose, run, -t]
      headless: [goose, run, -t]
      interactive: [goose, session]
