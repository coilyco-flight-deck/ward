name: release

# Tag-only release on every push to main. Conventional commits drive the
# semver bump. Tag is created at the pushed commit, GH Release is cut
# with the auto-generated changelog, then two bump jobs rewrite the
# Formula's url+tag+revision line via Contents API (web-flow signed,
# satisfies the signed-commits ruleset).
#
# Brew now installs from the centralized flight-deck tap:
#   brew tap coilyco-flight-deck/tap https://forgejo.coilysiren.me/coilyco-flight-deck/homebrew-tap
#   brew install coilyco-flight-deck/tap/ward
#
# The per-repo formula (Formula/ward.rb in this repo) is kept fresh for one
# migration cycle as a fallback for the old direct-repo tap:
#   brew tap coilyco-flight-deck/ward https://forgejo.coilysiren.me/coilyco-flight-deck/ward
#   brew install coilyco-flight-deck/ward/ward
#
# bump-formula writes the in-repo fallback; bump-tap-formula writes the
# central tap. Drop bump-formula + Formula/ward.rb next release cycle.
#
# All ${{ }} interpolations are repo-controlled - no github.event.*
# untrusted input flows into a run block.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-formula:
    # Rewrite Formula/ward.rb's url line to point at the just-cut
    # tag + revision. Brew reads the formula from the tap clone (latest
    # main), so the rewrite has to land back here. Commit message carries
    # the skip-CI marker so this push doesn't re-trigger the release workflow.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula url via Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          path=Formula/ward.rb
          tmp=$(mktemp -d)
          # Fetch the live main version (not the tag's snapshot - we want to
          # patch on top of the latest formula, including any non-version edits).
          curl -fsSL \
            "https://raw.githubusercontent.com/${REPO}/main/${path}" \
            > "$tmp/ward.rb"
          new_line="  url \"https://forgejo.coilysiren.me/${REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          sed -i "s|^  url \".*|${new_line}|" "$tmp/ward.rb"
          cur_sha=$(gh api "repos/${REPO}/contents/${path}?ref=main" --jq .sha)
          new_b64=$(base64 -w0 < "$tmp/ward.rb")
          gh api -X PUT "repos/${REPO}/contents/${path}" \
            -f message="chore(formula): bump to ${TAG} [skip ci]" \
            -f content="$new_b64" \
            -f sha="$cur_sha" \
            -f branch=main

  bump-tap-formula:
    # Rewrite Formula/ward.rb in the centralized flight-deck tap
    # (coilyco-flight-deck/homebrew-tap on forgejo) to point at the
    # just-cut tag + revision. This is a cross-repo + cross-host write, so
    # it uses a FORGEJO_TOKEN secret with write access to the tap rather
    # than the job's GITHUB_TOKEN (which only reaches this repo's github
    # mirror). The tap is where `brew install coilyco-flight-deck/tap/ward`
    # reads from.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
      FORGEJO_BASE_URL: https://forgejo.coilysiren.me
      WARD_REPO: coilyco-flight-deck/ward
      TAP_REPO: coilyco-flight-deck/homebrew-tap
      FORMULA_PATH: Formula/ward.rb
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rewrite tap Formula url via forgejo Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          # Patch on top of the tap's live main, preserving any non-version
          # edits (build flags, test logic).
          meta=$(curl -fsS -H "Authorization: token $FORGEJO_TOKEN" \
            "$FORGEJO_BASE_URL/api/v1/repos/$TAP_REPO/contents/$FORMULA_PATH?ref=main")
          cur_sha=$(jq -r '.sha' <<< "$meta")
          jq -r '.content' <<< "$meta" | base64 -d > "$tmp/ward.rb"
          new_line="  url \"$FORGEJO_BASE_URL/${WARD_REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          # awk so the URL's special chars don't need sed escaping.
          awk -v repl="$new_line" '
            /^  url "/ && !done { print repl; done = 1; next }
            { print }
          ' "$tmp/ward.rb" > "$tmp/ward.new.rb"
          mv "$tmp/ward.new.rb" "$tmp/ward.rb"
          new_b64=$(base64 -w0 < "$tmp/ward.rb")
          payload=$(jq -n --arg msg "chore(formula): bump ward to ${TAG} [skip ci]" \
            --arg c "$new_b64" --arg sha "$cur_sha" --arg branch main \
            '{message:$msg, content:$c, sha:$sha, branch:$branch}')
          code=$(curl -sS -o /tmp/tapresp.json -w '%{http_code}' -X PUT \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$FORGEJO_BASE_URL/api/v1/repos/$TAP_REPO/contents/$FORMULA_PATH")
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::forgejo tap formula bump failed: HTTP $code"
            cat /tmp/tapresp.json
            exit 1
          fi
