# golangci-lint config for the cli-* family. See docs/golangci.md.

version: "2"

run:
  timeout: 3m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
    - unparam
    - whitespace
    - gocyclo
    - gocognit
    - cyclop
    - funlen
    - nestif
    - gocritic
    - revive
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - errorlint
    - exhaustive
    - nilerr
    - nilnil
    - predeclared
    - wastedassign

  settings:
    gocyclo:
      min-complexity: 12
    gocognit:
      min-complexity: 20
    cyclop:
      max-complexity: 12
      package-average: 8
    funlen:
      lines: 100
      statements: 50
    nestif:
      min-complexity: 5
    gosec:
      excludes:
        - G204
        - G301
        - G302
        - G304
        - G306
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (*os.File).Close
        - os.Remove
        - os.RemoveAll
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    rules:
      - path: "_generated\\.go$"
        linters:
          - cyclop
          - funlen
          - gocognit
          - gocyclo
          - revive
          - gocritic
          - goconst
          - dupl
          - unparam
          - unused
          - misspell
          - errorlint
          - staticcheck
      - path: "_test\\.go$"
        linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - gocritic
          - goconst
          - errcheck
          - gosec
      - path: "^examples/"
        linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - errcheck
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 20
