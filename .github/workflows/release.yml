# Fully automatic release on every push to main, mirroring coily's pattern.
#
# 1. Every commit triggers at least a patch bump. Conventional-commit
#    subjects bump higher (feat: -> minor, feat!: / BREAKING CHANGE: -> major).
# 2. A tag is created and pushed.
# 3. A GitHub Release is created with the auto-generated changelog.
# 4. The new tarball sha256 is computed, then a repository_dispatch is
#    fired to coilysiren/homebrew-tap whose bump-agent-guard workflow
#    rewrites Formula/agent-guard.rb via the Contents API. The receiver
#    lives in homebrew-tap so the commit is signed by GitHub's web-flow
#    key (only installation-token API commits are auto-signed) and clears
#    the signed-commits ruleset.
#
# All ${{ }} interpolations are repo-controlled (action outputs, job
# needs); no github.event.* untrusted input flows into run blocks.
#
# Manual setup (one-time):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/agent-guard
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            Repository permissions -> Contents - Read and write.

name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          url="git@github.com:coilysiren/agent-guard.git"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Dispatch bump to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          NEW_URL: ${{ steps.rev.outputs.url }}
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        # Tap rewrites Formula/agent-guard.rb to brew's git URL strategy
        # (url+tag+revision), avoiding GitHub's anonymous-archive
        # rate-limit bucket. See homebrew-tap#26.
        run: |
          set -euo pipefail
          gh api -X POST repos/coilysiren/homebrew-tap/dispatches \
            -f event_type=bump-agent-guard \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[url]=${NEW_URL}" \
            -f "client_payload[revision]=${NEW_REVISION}"
