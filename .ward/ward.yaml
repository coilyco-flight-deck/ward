# Catalog schema: coilyco-flight-deck/agentic-os.
catalog:
  kind: Component
  type: tool
  system: coily-platform
  owner: kai
  lifecycle: production
  description: "ward - a contributor-facing cli-guard consumer. Carries project dev verbs; coily is the operator counterpart for personal machines."
  dependsOn:
    - forgejo.coilysiren.me/coilyco-flight-deck/cli-guard

commands:
  build:
    run: make build
    description: Build all packages.
  test:
    run: make test
    description: Run the unit test suite.
  vet:
    run: make vet
    description: go vet across the tree.
  lint:
    run: make lint
    description: Lint with golangci-lint.
  tidy:
    run: make tidy
    description: go mod tidy.
  cover:
    run: make cover
    description: Unit tests with a coverage profile.
  install-ward-kdl-tmp:
    run: make install-tmp
    description: Build ward-kdl and symlink it onto PATH as ward-kdl-tmp for ad hoc human testing.
