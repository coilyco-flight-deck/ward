# Forgejo-canonical release pipeline. See docs/release.md.

name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: docker
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: tag
        uses: coilysiren/agentic-os/actions/tag-bump@main

      - id: create
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: coilysiren/agentic-os/actions/create-release@main
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  publish-binaries:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    env:
      TAG: ${{ needs.release.outputs.tag }}
      GO_VERSION: "1.26.4"
      FORGEJO_API: https://forgejo.coilysiren.me/api/v1/repos/coilyco-flight-deck/ward
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Install Go
        run: |
          set -euo pipefail
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
          tar -xzf /tmp/go.tar.gz -C /usr/local
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Cross-compile ward (linux amd64 + arm64)
        run: |
          set -euo pipefail
          # GOPROXY=direct so fresh cli-guard pseudo-versions resolve, mirroring
          # the brew formula's build. See docs/homebrew-build.md.
          export GOPROXY=direct GOSUMDB=off
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.Version=${TAG}" \
              -o "dist/ward-linux-${arch}" ./cmd/ward
          done
          ls -l dist

      - name: Upload binaries as release assets
        env:
          TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::CI_RELEASE_TOKEN not set; cannot upload release assets" >&2
            exit 1
          fi
          rel_id=$(curl -fsSL -H "Authorization: token ${TOKEN}" \
            "${FORGEJO_API}/releases/tags/${TAG}" \
            | grep -oE '"id"[[:space:]]*:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+')
          if [ -z "${rel_id:-}" ]; then
            echo "::error::no release found for tag ${TAG}" >&2
            exit 1
          fi
          for arch in amd64 arm64; do
            curl -fsSL -X POST -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"dist/ward-linux-${arch}" \
              "${FORGEJO_API}/releases/${rel_id}/assets?name=ward-linux-${arch}"
            echo "uploaded ward-linux-${arch}"
          done

  bump-tap-formula:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: tap-writer
    env:
      TAG: ${{ needs.release.outputs.tag }}
      FORGEJO_BASE_URL: https://forgejo.coilysiren.me
      WARD_REPO: coilyco-flight-deck/ward
      TAP_REPO: coilyco-flight-deck/homebrew-tap
      FORMULA_PATH: Formula/ward.rb
    steps:
      - name: Bump tap formula and push
        run: |
          set -eu
          # Resolve the tagged revision without a JS checkout action.
          git clone --no-checkout --depth 1 --branch "$TAG" \
            "$FORGEJO_BASE_URL/$WARD_REPO.git" ward-src
          revision=$(git -C ward-src rev-parse HEAD)

          # Clone the tap's live main and patch on top, so any non-version
          # edits (build flags, test logic) survive.
          git clone --depth 1 "$FORGEJO_BASE_URL/$TAP_REPO.git" tap
          cd tap
          new_line="  url \"$FORGEJO_BASE_URL/${WARD_REPO}.git\", tag: \"${TAG}\", revision: \"${revision}\""
          # awk so the URL's special chars don't need sed escaping.
          awk -v repl="$new_line" '
            /^  url "/ && !done { print repl; done = 1; next }
            { print }
          ' "$FORMULA_PATH" > "$FORMULA_PATH.new"
          mv "$FORMULA_PATH.new" "$FORMULA_PATH"

          if git diff --quiet -- "$FORMULA_PATH"; then
            echo "formula already at ${TAG}, nothing to push"
            exit 0
          fi
          git config user.name "forgejo-tap-writer"
          git config user.email "tap-writer@coilysiren.me"
          git commit -aqm "chore(formula): bump ward to ${TAG} [skip ci]"
          # Auth comes from the runner's credential helper, never from env.
          git push origin HEAD:main
